<!DOCTYPE html>
<html lang="uk">

<head>
    <meta charset="UTF-8">
    <title>Product Landing Page - Варіант 7</title>
    <link rel="stylesheet" href="Lab3.css">
</head>

<body>

    <article class="product-container">
        <header class="product-header">
            <h1>RTX 5070</h1>
        </header>

        <div class="product-body">
            <figure class="product-image">
                <img src="product.jpg" alt="Моя відеокарта">
            </figure>

            <div class="product-info">
                <section class="details">
                    <h2>ДЕТАЛІ</h2>
                    <p>Це преміальний товар, розроблений для максимальної ефективності та комфорту у використанні.</p>
                </section>

                <section class="specifications">
                    <h2>ТЕХНІЧНІ ХАРАКТЕРИСТИКИ</h2>
                    <ul>
                        <li>Матеріал: Високоякісний алюміній</li>
                        <li>Вага: 1.2 кг</li>
                        <li>Гарантія: 24 місяці</li>
                    </ul>
                </section>

                <aside class="reviews">
                    <h2>ВІДГУКИ</h2>
                    <div class="stars">★★★★★</div>
                    <p class="review-text">"Найкраща покупка за цей рік! Якість на висоті."</p>
                </aside>
            </div>
        </div>

        <footer class="product-footer">
            <button class="buy-button">КУПИТИ</button>
        </footer>
    </article>

</body>

</html>
