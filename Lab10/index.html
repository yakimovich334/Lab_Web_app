<script type="text/javascript">
    // 1. Ініціалізація DayPilot Scheduler
    var dp = new DayPilot.Scheduler("dp");

    // 2. Налаштування відображення
    dp.resourceColumns = [
    {name: "Номер", id: "name"},
    {name: "Місткість", id: "capacity"}, // має збігатися з capacity в БД
    {name: "Статус", id: "status"}     // має збігатися з status в БД
    ];

    dp.scale = "Day";
    dp.startDate = "2017-01-01";
    dp.days = 31;
    dp.cellWidth = 50;
    dp.headerHeight = 40;

    dp.timeHeaders = [
        { "groupBy": "Month", "format": "MMMM yyyy" },
        { "groupBy": "Day", "format": "d" }
    ];

    // 3. Функції завантаження даних (AJAX)
    function loadResources() {
        $.ajax({
            url: "backend_rooms.php",
            dataType: "json",
            success: function(data) {
                dp.resources = data;
                dp.update();
            }
        });
    }

    function loadEvents() {
    // Вказуємо параметри початку і кінця, щоб бекенд знав, за який період шукати
    dp.events.load("backend_reservations.php");
    }

    // 4. Обробка ручного вибору дати
    $("#btnChangeDate").click(function() {
        var month = $("#selectMonth").val();
        var year = $("#selectYear").val();
        
        // Встановлюємо нову дату (перше число)
        var startStr = year + "-" + month + "-01";
        
        // Розраховуємо кількість днів у вибраному місяці
        var daysInMonth = new Date(year, month, 0).getDate();

        dp.startDate = startStr;
        dp.days = daysInMonth;
        
        dp.update();
        loadEvents(); // Перевантажуємо броні для нової дати
        dp.message("Календар оновлено: " + $("#selectMonth option:selected").text() + " " + year);
    });

    // 5. Операції Drag-and-Drop (Move)
    dp.onEventMoved = function (args) {
        $.post("backend_move.php", {
            id: args.e.id(),
            newStart: args.newStart.toString(),
            newEnd: args.newEnd.toString(),
            newResource: args.newResource
        }, function() {
            dp.message("Бронювання переміщено");
        });
    };

    // 6. Операція Resize
    dp.onEventResized = function (args) {
        $.post("backend_move.php", {
            id: args.e.id(),
            newStart: args.newStart.toString(),
            newEnd: args.newEnd.toString(),
            newResource: args.e.resource()
        }, function() {
            dp.message("Тривалість змінена");
        });
    };

    // Ініціалізація
   dp.init();
   loadResources(); 
   loadEvents();
</script>
